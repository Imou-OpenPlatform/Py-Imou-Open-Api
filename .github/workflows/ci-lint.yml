name: Lint

on:
  push:
    branches: [main, dev]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - uses: reviewdog/action-setup@v1
        if: github.event_name == 'pull_request'
        with:
          reviewdog_version: latest
      - name: Ruff check
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run ruff check pyimouapi tests --output-format=rdjson | \
              reviewdog -f=rdjson -name="ruff" -reporter=github-pr-review -fail-on-error=true
          else
            uv run ruff check pyimouapi tests
          fi
      - run: uv run ruff format --check pyimouapi tests

  spell:
    name: Spell
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --dev
      - uses: reviewdog/action-setup@v1
        if: github.event_name == 'pull_request'
        with:
          reviewdog_version: latest
      - name: codespell
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          SPELL_PATHS="pyimouapi tests README.md CHANGELOG.md CONTRIBUTING.md AGENTS.md"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run codespell $SPELL_PATHS | \
              reviewdog -efm="%f:%l: %m" -name="codespell" -reporter=github-pr-review -fail-on-error=true
          else
            uv run codespell $SPELL_PATHS
          fi

  yamllint:
    name: YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --dev
      - run: |
          uv run yamllint \
            .github/workflows/ci-lint.yml \
            .github/workflows/ci-test.yml \
            .github/workflows/publish.yml \
            .github/dependabot.yml \
            .pre-commit-config.yaml \
            .yamllint.yml

  version-sync:
    name: Version-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --dev
      - name: Verify setup.py, __init__, and pyproject.toml versions align
        run: |
          SETUP_VERSION=$(uv run python -c "import re; print(re.search(r'version=\"([^\"]+)\"', open('setup.py').read()).group(1))")
          INIT_VERSION=$(uv run python -c "from pyimouapi import __version__; print(__version__)")
          PYPROJECT_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")

          test -n "$SETUP_VERSION" && test "$SETUP_VERSION" != "null"
          test -n "$INIT_VERSION" && test "$INIT_VERSION" != "null"
          test -n "$PYPROJECT_VERSION" && test "$PYPROJECT_VERSION" != "null"
          test "$SETUP_VERSION" = "$INIT_VERSION"
          test "$SETUP_VERSION" = "$PYPROJECT_VERSION"

          echo "setup.py: $SETUP_VERSION"
          echo "__init__: $INIT_VERSION"
          echo "pyproject.toml: $PYPROJECT_VERSION"
